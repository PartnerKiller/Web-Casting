<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCast Remote Dashboard</title>
  <meta name="description" content="A premium glassmorphic local web remote dashboard to control and cast media to your Smart TV or Jio Set-Top Box.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nebula background elements -->
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>

  <div class="container">
    <header class="app-header">
      <div class="brand">
        <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="15" rx="2" ry="2"></rect>
          <polyline points="12 17 12 22"></polyline>
          <line x1="8" y1="22" x2="16" y2="22"></line>
          <path d="M12 7v4M9 9h6"></path>
        </svg>
        <div class="brand-text">
          <h1>SmartCast Remote</h1>
          <span class="subtext">Universal Local Casting</span>
        </div>
      </div>

      <!-- Target Configuration Widget -->
      <div class="target-config">
        <label for="target-ip-input">Target:</label>
        <input type="text" id="target-ip-input" class="target-ip-input" placeholder="192.168.0.165" value="192.168.0.165">
        <button id="btn-update-ip" class="btn-update">Update</button>
        <button id="btn-restart-server" class="btn-restart" title="Restart Server Process">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
          </svg>
        </button>
      </div>

      <div class="status-indicator">
        <span class="status-dot disconnected" id="status-dot"></span>
        <span class="status-label" id="status-label">Connecting...</span>
      </div>
    </header>

    <main class="dashboard-grid">
      <!-- Left Panel: Device status and controls -->
      <section class="panel panel-left card">
        <div class="card-header">
          <h2>Device Control</h2>
          <span class="active-app-badge" id="active-app">None</span>
        </div>

        <div class="now-playing-container">
          <div class="media-art-placeholder" id="media-art-container">
            <svg class="music-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 18V5l12-2v13"></path>
              <circle cx="6" cy="18" r="3"></circle>
              <circle cx="18" cy="16" r="3"></circle>
            </svg>
            <img id="media-art" src="" alt="Album Art" class="hidden">
          </div>
          <div class="media-details">
            <h3 id="media-title">No media active</h3>
            <p id="media-artist">Idle</p>
          </div>
        </div>

        <!-- Playback Progress Slider (Optional/Disabled state until casted) -->
        <div class="progress-bar-container">
          <span class="time-label" id="current-time">0:00</span>
          <div class="progress-track" id="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-tooltip hidden" id="progress-tooltip">0:00</div>
          </div>
          <span class="time-label" id="total-time">0:00</span>
        </div>

        <!-- Control Buttons -->
        <div class="controls-row">
          <button class="btn btn-control btn-secondary btn-power-on" id="btn-power-on" title="Turn ON Receiver app">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/>
            </svg>
          </button>
          <button class="btn btn-control btn-secondary" id="btn-stop" disabled title="Stop playback">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <rect x="4" y="4" width="16" height="16" rx="2"></rect>
            </svg>
          </button>
          <button class="btn btn-control btn-secondary" id="btn-skip-back" disabled title="Rewind 10 seconds">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
              <text x="12" y="15.5" font-size="8" font-family="system-ui, -apple-system, sans-serif" font-weight="800" text-anchor="middle" fill="currentColor" stroke="none">10</text>
            </svg>
          </button>
          <button class="btn btn-control btn-primary btn-play-pause" id="btn-play-pause" disabled title="Play / Pause">
            <svg class="play-icon" id="svg-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="pause-icon hidden" id="svg-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16" rx="1"></rect>
              <rect x="14" y="4" width="4" height="16" rx="1"></rect>
            </svg>
          </button>
          <button class="btn btn-control btn-secondary" id="btn-skip-forward" disabled title="Forward 10 seconds">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <text x="12" y="15.5" font-size="8" font-family="system-ui, -apple-system, sans-serif" font-weight="800" text-anchor="middle" fill="currentColor" stroke="none">10</text>
            </svg>
          </button>
          <button class="btn btn-control btn-secondary btn-power-off" id="btn-power-off" title="Turn OFF Receiver app">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/>
            </svg>
          </button>
        </div>

        <!-- Volume Slider -->
        <div class="volume-container">
          <button class="btn btn-icon" id="btn-mute" title="Mute/Unmute">
            <svg class="vol-icon" id="svg-vol-up" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg class="vol-icon hidden" id="svg-vol-mute" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
          </button>
          <input type="range" id="vol-slider" class="vol-slider" min="0" max="100" value="50">
          <span class="vol-label" id="vol-label">50%</span>
        </div>
        
        <!-- Playlist Queue Section -->
        <div class="playlist-section">
          <div class="playlist-header">
            <h3>Playlist Queue</h3>
            <button class="btn btn-secondary btn-small" id="btn-clear-queue">Clear Queue</button>
          </div>
          <div class="playlist-items" id="playlist-queue">
            <div class="empty-queue-msg">Queue is empty</div>
          </div>
        </div>
      </section>

      <!-- Right Panel: Cast Form & Quick Cast Catalog -->
      <div class="panel-right">
        <!-- Local File Cast Card -->
        <section class="panel card upload-card">
          <h2>Cast Local File</h2>
          <div class="upload-zone" id="upload-zone">
            <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <div class="upload-prompt">
              <p class="primary-prompt">Drag & Drop media file or <span class="browse-link">browse</span></p>
              <p class="secondary-prompt">Supports MP4, MKV, MP3 up to 500MB</p>
            </div>
            <input type="file" id="file-input" class="file-input" accept="video/*,audio/*" multiple>
          </div>
          
          <!-- Upload Progress Bar (hidden by default) -->
          <div class="upload-progress-container hidden" id="upload-progress-container">
            <div class="upload-progress-bar">
              <div class="upload-progress-fill" id="upload-progress-fill"></div>
            </div>
            <div class="upload-progress-details">
              <span id="upload-progress-percent">0%</span>
              <span id="upload-status-text">Uploading...</span>
            </div>
          </div>
        </section>

        <!-- Cast Hub Form -->
        <section class="panel card form-card">
          <h2>Cast Media Stream</h2>
          <form id="cast-form" class="cast-form">
            <div class="form-group">
              <label for="media-url">Media Stream URL</label>
              <input type="url" id="media-url" placeholder="https://example.com/stream.mp4" required>
            </div>
            
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="media-title-input">Title</label>
                <input type="text" id="media-title-input" placeholder="My Video Stream">
              </div>
              <div class="form-group flex-1">
                <label for="media-type">Content Type</label>
                <select id="media-type">
                  <option value="video/mp4">Video (MP4)</option>
                  <option value="application/x-mpegURL">HLS Adaptive Stream (.m3u8)</option>
                  <option value="video/mkv">Video (MKV)</option>
                  <option value="audio/mp3">Audio (MP3)</option>
                  <option value="image/jpeg">Image (JPEG)</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="media-poster">Poster Image URL (Optional)</label>
              <input type="url" id="media-poster" placeholder="https://example.com/poster.jpg">
            </div>

            <button type="submit" class="btn btn-submit" id="btn-cast-submit">
              <span>Cast</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="cast-btn-icon">
                <path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"></path>
                <line x1="2" y1="20" x2="2.01" y2="20"></line>
              </svg>
            </button>
          </form>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
