<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Web Receiver</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }
    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video, audio {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background-color: #000;
    }
    
    /* Splash & Loading Screen */
    .splash-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #101223 0%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.8s ease;
      opacity: 1;
    }
    
    .splash-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .cast-icon {
      width: 80px;
      height: 80px;
      color: #7c3aed;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite alternate;
    }
    
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      100% { transform: scale(1.05); opacity: 1; }
    }
    
    .splash-title {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: #f3f4f6;
    }
    
    .splash-status {
      font-size: 1rem;
      color: #9ca3af;
    }
    
    /* Connection Warning Overlay */
    .conn-warning {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.4);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fca5a5;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .conn-warning.visible {
      opacity: 1;
    }
    
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border-left-color: #7c3aed;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Media Information Banner (shows when starting playback) */
    .media-info-banner {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 450px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateY(100px);
      opacity: 0;
      z-index: 15;
    }

    .media-info-banner.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .banner-poster {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .banner-text h4 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
    }

    .banner-text p {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    /* Floating Fullscreen Button */
    .btn-fullscreen-float {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
      z-index: 25;
      transition: all 0.2s ease;
    }
    
    .btn-fullscreen-float:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }
    
    .btn-fullscreen-float svg {
      width: 16px;
      height: 16px;
    }

    /* Click to Unmute Toast */
    .unmute-toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(124, 58, 237, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1.25rem 2.5rem;
      border-radius: 9999px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 28;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      animation: bounce 2s infinite;
    }
    
    .unmute-toast.visible {
      opacity: 1;
      pointer-events: auto;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="player-container">


    <!-- Active Player Elements -->
    <video id="video-player" class="hidden"></video>
    <audio id="audio-player" class="hidden"></audio>

    <!-- Click to Unmute Overlay Toast -->
    <div id="unmute-toast" class="unmute-toast">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/>
      </svg>
      <span>Audio Muted. Click Screen to Unmute</span>
    </div>

    <!-- Disconnection Warning Banner -->
    <div id="conn-warning" class="conn-warning">
      <div class="spinner"></div>
      <span>Reconnecting to PC Server...</span>
    </div>

    <!-- Default Splash Screen -->
    <div id="splash-screen" class="splash-overlay">
      <svg class="cast-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"></path>
        <line x1="2" y1="20" x2="2.01" y2="20"></line>
      </svg>
      <h2 class="splash-title" id="splash-title">Receiver Ready</h2>
      <p class="splash-status" id="splash-status">Waiting for cast stream from PC...</p>
      <p style="font-size: 0.8rem; color: #6b7280; margin-top: 1rem;">Note: Click anywhere on this screen once to enable audio autoplay.</p>
    </div>

    <!-- Media Info Toast Notification -->
    <div id="media-banner" class="media-info-banner">
      <div class="banner-poster" id="banner-poster"></div>
      <div class="banner-text">
        <h4 id="banner-title">Loading Stream...</h4>
        <p id="banner-type">Video Feed</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="tv.js"></script>
</body>
</html>
